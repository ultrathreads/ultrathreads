mode: release
base:
  port: 9527
  url: https://ultrathreads.com
  static_path: /data/www

database:
  driver: mysql
  mysql:
    charset: utf8
    host: 127.0.0.1:3306
    name: ultrathreads
    user: root
    password: root123!
    pool:
      max: 20
      min: 5
    ssl: false
  sqlite:
    path: data/ultrathreads.db

jwt:
  identity_key: ultrathreads_id
  key: secret key

uploader:
  enable: oss
  oss:
    host: 请配置成你自己的
    bucket: 请配置成你自己的
    endpoint: 请配置成你自己的
    access_id: 请配置成你自己的
    access_secret: 请配置成你自己的
  local:
    host: https://static.ultrathreads.com/ # 上传文件域名
    path: /data/www # 上传目录

# github登录配置，回调地址：http://base.url/oauth/github/callback
github:
  client_id:
  client_secret:

# gitee登录配置，回调地址：http://base.url/oauth/gitee/callback
gitee:
  client_id:
  client_secret:

# qq登录配置，回调地址：http://base.url/oauth/qq/callback
qq:
  client_id:
  client_secret:

cors:
  allow_credentials: true
  allow_headers:
    - Content-Type
    - Authorization
    - Accept
    - Origin
    - X-Requested-With
  allow_methods:
    - GET
    - POST
    - OPTIONS
    - PUT
    - DELETE
  allow_origins:
    - http://localhost:3000
  enable: true
  max_age: 7200
smtp:
  addr: smtp.qq.com
  port: 25
  username: 请配置成你自己的
  password: 请配置成你自己的
  ssl: true